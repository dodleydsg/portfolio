<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#5C6BC0">

        <link rel="stylesheet" href="styles/output.css">
        <link rel="manifest" href="manifest.json">
        <link rel="apple-touch-icon" href="/assets/images/logos/logo-192x192.png">
        <link rel="shortcut icon"
              href="/assets/images/logos/logo-36x36.png"
              type="image/png">
        <link rel="shortcut icon"
              href="/assets/images/logos/logo-24x24.png"
              type="image/png">
        <title>About | Get to know me more</title>
    </head>
    <body>
        <body class="bg-gradient-to-br from-[#1E1E1E] to-[#2F2C2C] ">
            <div class="flex  relative min-h-screen divide-x-2 divide-[#2F2E2E] h-full bg-repeat"
                 style="background-image: url('assets/images/otis-redding.png');">
                <nav class="absolute z-[60] container mx-auto bg-white h-20 left-0 right-0 justify-between flex items-center px-8 shadow-lg shadow-[#1E1E1E]">
                    <div>
                        <a href="index.html" class="text-[#5C6BC0] text-2xl">Dodley Andu</a>
                    </div>
                    <div id='nav'
                         class="absolute  transition-transform duration-500 right-0 left-0 top-0 bottom-0 h-screen md:h-auto bg-[#1E1E1E] md:bg-inherit md:relative items-center md:items-center flex flex-col md:z-auto text-[#7E7E7E] md:flex-row space-x-4 space-y-6 md:space-y-0 p-5 md:p-0 scale-y-0 md:scale-y-100">
                        <span class="md:hidden self-end fill-[#7E7E7E] hover:fill-gray-300 transition duration-300"
                              id="nav_close">
                            <svg xmlns="http://www.w3.org/2000/svg" height="48" width="48">
                                <path d="m12.45 37.65-2.1-2.1L21.9 24 10.35 12.45l2.1-2.1L24 21.9l11.55-11.55 2.1 2.1L26.1 24l11.55 11.55-2.1 2.1L24 26.1Z"/>
                            </svg>
                        </span>
                        <a href="https://twitter.com/dodleyandu"
                           class="hover:text-gray-300 transition-all duration-300"
                           target="_blank">Twitter</a>
                        <a href="https://linkedin.com/in/dodleydesign"
                           class="hover:text-gray-300 transition-all duration-300"
                           target="_blank">LinkedIn</a>
                        <a href="https://github.com/dodleydsg"
                           class="hover:text-gray-300 transition-all duration-300"
                           target="_blank">Github</a>
                        <a href="https://behance.net/dodleydesigns"
                           class="hover:text-gray-300 transition-all duration-300"
                           target="_blank">Behance</a>
                    </div>
                    <div class="block md:hidden ">
                        <span id='nav_open'
                              class="fill-[#7E7E7E] hover:fill-gray-300 transition duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" height="48" width="48">
                                <path d="M6 36v-3h36v3Zm0-10.5v-3h36v3ZM6 15v-3h36v3Z"/>
                            </svg>
                        </span>
                    </div>
                </nav>
                <div class="fixed md:absolute bg-white md:rounded-md shadow-md bottom-0 md:bottom-8 right-0 left-0 md:left-auto md:right-8 flex flex-row md:flex-col divide-x md:divide-y justify-center md:py-0 items-center md:items-stretch">
                    <a href="index.html"
                       class="px-4 hover:text-white hover:bg-[#1E1E1E] transition-all duration-300 pt-2 pb-2 md:pb-2 md:pt-4">Home</a>
                    <a href="projects.html"
                       class="px-4 hover:text-white hover:bg-[#1E1E1E] transition-all duration-300 pt-2 pb-2 md:py-2">Projects</a>
                    <a href="#"
                       class="px-4 hover:text-white hover:bg-[#1E1E1E] transition-all duration-300 pt-2.5 pb-2.5 md:pt-2 md:pb-4">Resumé</a>
                </div>
            </div>
            <script src="scripts/app.js"></script>
            <script>
            let nav = document.querySelector("#nav");
            let close = document.querySelector("#nav_close");
            let open = document.querySelector("#nav_open");

            close.addEventListener("click", () => {
            nav.classList.toggle("scale-y-0");
            });
            open.addEventListener("click", () => {
            nav.classList.toggle("scale-y-0");
            });

            </script>
        </body>
    </html>
